<!DOCTYPE html>
<html lang="en">
    <head>
        <title>WhatsUpDLSU - Events</title>

        <link rel="stylesheet" href="css/events.css">
    </head>

    <body>

        <nav class="navbar">

            <div class="nav-left">
                <div class="logo-placeholder"></div>
                <span class="logo-text">WhatsUpDLSU</span>
            </div>

            <div class="nav-right">

                <div class="nav-links">
                    <a href="index.html" class="nav-tab">Home</a>
                    <a href="events.html" class="nav-tab active">Events</a>
                    <a href="calendar.html" class="nav-tab">Calendar</a>
                </div>

                <div class="profile-section">

                    <button class="profile-btn" id="profileBtn">
                        Student Name ▼
                    </button>

                    <div class="dropdown-menu" id="dropdownMenu">

                        <button>DARK/LIGHT MODE</button>

                        <button onclick="location.href='edit-profile.html'">
                            EDIT USER DETAILS
                        </button>

                        <button onclick="location.href='index.html'">
                            LOG OUT
                        </button>

                    </div>

                </div>

            </div>

        </nav>

        <section class="search-section">

            <input type="text" id="searchInput" placeholder="Search Events" class="search-input" >

            <input type="date" class="filter-box" >

            <select class="filter-box">
                <option>Category</option>
                <option>Academic</option>
                <option>Career</option>
                <option>Non-academic</option>
            </select>

            <select class="filter-box">
                <option>Newest</option>
                <option>Oldest</option>
            </select>

        </section>

        <main class="events-layout">

            <aside class="event-sidebar" id="eventSidebar">

                <button class="event-item active"
                    data-title="Sample Event"
                    data-category="Arts & Culture"
                    data-duration="8:00 AM - 6:00 PM"
                    data-venue="Henry Sy Hall"
                    data-status="Upcoming"
                    data-registration="Open"
                    data-organizer="DLSU USG"
                    data-description="Sample event information."
                >
                    Sample Event
                </button>

                <button class="event-item"
                    data-title="Leadership Seminar"
                    data-category="Career"
                    data-duration="1:00 PM - 4:00 PM"
                    data-venue="Yuchengco Hall"
                    data-status="Upcoming"
                    data-registration="Open"
                    data-organizer="Business Society"
                    data-description="Leadership training seminar."
                >
                    Leadership Seminar
                </button>

                <button class="event-item"
                    data-title="Research Expo"
                    data-category="Academic"
                    data-duration="9:00 AM - 5:00 PM"
                    data-venue="Andrew Hall"
                    data-status="Upcoming"
                    data-registration="Open"
                    data-organizer="DLSU Research Center"
                    data-description="Research presentations."
                >
                    Research Expo
                </button>

            </aside>

            <section class="event-detail">

                <div class="event-info">

                    <h1 id="eventTitle">Sample Event</h1>

                    <div class="details">

                        <p><strong>Category:</strong>
                            <span id="category">Arts & Culture</span>
                        </p>

                        <p><strong>Duration:</strong>
                            <span id="duration">8:00 AM - 6:00 PM</span>
                        </p>

                        <p><strong>Venue:</strong>
                            <span id="venue">Henry Sy Hall</span>
                        </p>

                        <p><strong>Status:</strong>
                            <span id="status">Upcoming</span>
                        </p>

                        <p><strong>Registration:</strong>
                            <span id="registration">Open</span>
                        </p>

                        <p><strong>Organizer:</strong>
                            <span id="organizer">DLSU USG</span>
                        </p>

                    </div>

                    <div class="description">

                        <h3>Description:</h3>

                        <p id="description">
                            Sample event information.
                        </p>

                    </div>

                    <button
                        id="interestedBtn"
                        class="interested-btn">

                        Interested!

                    </button>

                </div>

                <div class="image-column">

                    <div class="image-box">
                        Event Image 1
                    </div>

                    <div class="image-box">
                        Event Image 2
                    </div>

                </div>

            </section>

        </main>

        <script src="js/events.js"></script>

    </body>
</html>
